<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spice & Sauce Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Styles -->
  <link rel="stylesheet" href="/styles/style.css" />

  <!-- Manifest + Icons -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icons/favicon.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Register Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</head>

<body>
  <header>
    <h1>🌶 Spice & Sauce Lab</h1>
    <input id="searchInput" placeholder="Search spices & sauces..." />
  </header>

  <nav id="categoryNav"></nav>

  <main>
    <section id="listView"></section>
    <section id="detailView" class="hidden"></section>
  </main>

  <!-- MODULE SCRIPTS -->
  <script type="module" src="/js/spices.js"></script>
  <script type="module" src="/js/sauces.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
