<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spice & Sauce Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Styles -->
  <link rel="stylesheet" href="/styles/style.css" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>

<body>
  <header class="app-header">
    <h1>🌶 Spice & Sauce Lab</h1>

    <input
      id="searchInput"
      type="text"
      placeholder="Search spices & sauces..."
      autocomplete="off"
      aria-label="Search spices and sauces"
    />
  </header>

  <nav id="categoryNav" class="category-nav"></nav>

  <main class="app-main">
    <section id="listView" class="list-view"></section>
    <section id="detailView" class="detail-view hidden"></section>
  </main>

  <!-- Main Entrypoint -->
  <script type="module" src="/js/index.js"></script>
</body>
</html>
